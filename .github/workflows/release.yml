name: Build and Release

on:
  push:
    branches:
      - main
    paths:
      - package.json
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read version from package.json
        id: version
        run: echo "tag=v$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Check whether this version is already released
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Already released - nothing to do."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: check
    if: needs.check.outputs.exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type-check
        run: deno check src/index.ts src/index.test.ts

      - name: Run tests
        run: deno test --allow-read --allow-write

  build:
    needs: [check, test]
    if: needs.check.outputs.exists == 'false'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - dir: linux
            target: x86_64-unknown-linux-gnu
            ext: ""
          - dir: win
            target: x86_64-pc-windows-msvc
            ext: ".exe"
          - dir: mac
            target: x86_64-apple-darwin
            ext: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Compile binary for ${{ matrix.dir }}
        run: |
          deno compile --allow-read --allow-write \
            --target ${{ matrix.target }} \
            --output ./src/${{ matrix.dir }}/singlefile_companion_lite${{ matrix.ext }} \
            ./src/index.ts

      - name: Zip installer bundles for ${{ matrix.dir }}
        run: |
          mkdir -p install
          for browser in chromium firefox; do
            zip -j "install/${browser}-${{ matrix.dir }}.zip" \
              "./src/${{ matrix.dir }}/singlefile_companion_lite${{ matrix.ext }}" \
              ./src/options.json \
              ./src/${{ matrix.dir }}/${browser}/*
          done

      - name: Upload ${{ matrix.dir }} bundles
        uses: actions/upload-artifact@v7
        with:
          name: bundles-${{ matrix.dir }}
          path: install/*.zip
          retention-days: 14

  release:
    needs: [check, build]
    if: needs.check.outputs.exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Download all platform bundles
        uses: actions/download-artifact@v8
        with:
          path: install
          pattern: bundles-*
          merge-multiple: true

      - name: Verify expected bundles exist
        run: |
          set -e
          for f in chromium-linux chromium-mac chromium-win firefox-linux firefox-mac firefox-win; do
            test -f "install/${f}.zip" || { echo "Missing install/${f}.zip"; exit 1; }
          done

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.check.outputs.tag }}" install/*.zip \
            --title "${{ needs.check.outputs.tag }}" \
            --target "${{ github.sha }}" \
            --repo "${{ github.repository }}" \
            --generate-notes
