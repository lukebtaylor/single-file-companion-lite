name: CI

on:
  push:
    branches:
      - main
  pull_request: {}
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type-check
        run: deno check src/index.ts src/index.test.ts

      - name: Run tests
        run: deno test --allow-read --allow-write --allow-env=HOME,USERPROFILE
